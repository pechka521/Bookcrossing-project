<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Редактирование профиля')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<style>
  .edit-wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }
  .edit-card {
    background: #fff; border-radius: 24px; padding: 32px;
    border: 1.5px solid #f1f5f9; box-shadow: 0 2px 12px rgba(0,0,0,.05);
    margin-bottom: 16px;
  }
  .edit-card h4 { font-size: .95rem; font-weight: 700; color: #1a1a2e; margin-bottom: 20px; }
  .form-label { font-size: .78rem; font-weight: 600; color: #64748b; margin-bottom: 5px; }
  .form-control, .form-select {
    border: 1.5px solid #e2e8f0; border-radius: 12px;
    padding: 10px 14px; font-size: .9rem;
    transition: border-color .2s, box-shadow .2s;
  }
  .form-control:focus, .form-select:focus {
    border-color: #3b5bdb; box-shadow: 0 0 0 3px rgba(59,91,219,.1); outline: none;
  }
  .form-control.is-invalid { border-color: #ef4444; }
  .char-counter { font-size: .72rem; color: #94a3b8; text-align: right; margin-top: 3px; }
  .char-counter.warn { color: #f59e0b; }
  .char-counter.over { color: #ef4444; }

  .avatar-preview-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .avatar-preview {
    width: 80px; height: 80px; border-radius: 50%;
    object-fit: cover; border: 2.5px solid #e2e8f0;
    transition: border-color .2s;
  }
  .btn-save {
    background: linear-gradient(135deg, #3b5bdb, #7048e8);
    color: #fff; border: none; border-radius: 12px;
    padding: 13px 32px; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: opacity .2s, transform .1s;
    box-shadow: 0 4px 14px rgba(59,91,219,.3);
  }
  .btn-save:hover { opacity: .9; }
  .btn-save:active { transform: scale(.98); }
  .alert-danger  { border-radius: 12px; font-size: .88rem; }
  .alert-success { border-radius: 12px; font-size: .88rem; }

  .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: #e2e8f0; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; }
  .strength-text { font-size: .72rem; color: #94a3b8; margin-top: 3px; }
</style>

<div class="edit-wrap">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="/profile" class="btn btn-outline-secondary rounded-pill btn-sm px-3">← Назад</a>
    <h2 style="font-size:1.25rem;font-weight:800;color:#1a1a2e;margin:0;">✏️ Редактирование профиля</h2>
  </div>

  <!-- Ошибка -->
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
    <i class="fas fa-exclamation-circle me-2"></i>
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <form th:action="@{/profile/edit}" method="post" enctype="multipart/form-data" novalidate id="editForm">

    <!-- ══ Аватар и основное ══ -->
    <div class="edit-card">
      <h4>👤 Основная информация</h4>

      <!-- Аватар -->
      <div class="avatar-preview-wrap">
        <img id="avatarPreview" th:src="${user.avatarDisplay}"
             class="avatar-preview" alt="Аватар">
        <div>
          <label class="form-label d-block">Фото профиля</label>
          <input type="file" name="avatarFile" id="avatarFile"
                 accept="image/jpeg,image/png,image/webp"
                 class="form-control form-control-sm" style="max-width:260px;"
                 onchange="previewAvatar(this)">
          <div class="char-counter mt-1">JPEG, PNG, WebP — не более 3 МБ</div>
          <div id="avatarError" class="text-danger small mt-1" style="display:none;"></div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Полное имя</label>
          <input type="text" name="fullName" class="form-control"
                 th:value="${user.fullName}"
                 maxlength="100" placeholder="Иванов Иван">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" id="emailInput" class="form-control"
                 th:value="${user.email}"
                 placeholder="example@mail.ru">
          <div id="emailError" class="text-danger small mt-1" style="display:none;"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Город</label>
          <input type="text" name="city" class="form-control"
                 th:value="${user.city}" maxlength="80" placeholder="Москва">
        </div>
        <div class="col-md-6">
          <label class="form-label">Страна</label>
          <input type="text" name="country" class="form-control"
                 th:value="${user.country}" maxlength="80" placeholder="Россия">
        </div>
        <div class="col-md-6">
          <label class="form-label">Пол</label>
          <select name="gender" class="form-select">
            <option value="">Не указан</option>
            <option value="Мужской" th:selected="${user.gender == 'Мужской'}">Мужской</option>
            <option value="Женский" th:selected="${user.gender == 'Женский'}">Женский</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Дата рождения</label>
          <input type="date" name="birthDate" class="form-control"
                 th:value="${user.birthDate}">
        </div>
      </div>
    </div>

    <!-- ══ О себе ══ -->
    <div class="edit-card">
      <h4>💬 О себе</h4>
      <div>
        <label class="form-label">Расскажите о себе</label>
        <textarea name="aboutMe" id="aboutMeText" rows="4" class="form-control"
                  maxlength="1000"
                  placeholder="Несколько слов о себе, любимых книгах, интересах..."
                  th:text="${user.aboutMe}"></textarea>
        <div class="char-counter"><span id="aboutMeCount">0</span> / 1000</div>
      </div>
      <div class="mt-3">
        <label class="form-label">Любимые жанры</label>
        <input type="text" name="favoriteGenres" class="form-control"
               th:value="${user.favoriteGenres}" maxlength="200"
               placeholder="Фантастика, детектив, классика...">
      </div>
      <div class="mt-3">
        <label class="form-label">Социальные сети / ссылки</label>
        <input type="text" name="socialLinks" class="form-control"
               th:value="${user.socialLinks}" maxlength="500"
               placeholder="VK: vk.com/... Telegram: @...">
      </div>
    </div>

    <!-- ══ Смена пароля ══ -->
    <div class="edit-card">
      <h4>🔐 Смена пароля <small class="text-muted fw-normal fs-6">(оставьте пустым, чтобы не менять)</small></h4>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Текущий пароль</label>
          <input type="password" name="currentPassword" id="currentPass"
                 class="form-control" placeholder="Введите текущий пароль">
        </div>
        <div class="col-md-6">
          <label class="form-label">Новый пароль</label>
          <input type="password" name="newPassword" id="newPass"
                 class="form-control" placeholder="Минимум 6 символов"
                 oninput="checkStrength(this.value)">
          <div class="strength-bar mt-1">
            <div class="strength-fill" id="strengthFill" style="width:0%"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Подтверждение пароля</label>
          <input type="password" name="confirmPassword" id="confirmPass"
                 class="form-control" placeholder="Повторите новый пароль"
                 oninput="checkMatch()">
          <div id="matchError" class="text-danger small mt-1" style="display:none;">
            Пароли не совпадают
          </div>
        </div>
      </div>
    </div>

    <!-- ══ Кнопки ══ -->
    <div class="d-flex gap-3">
      <button type="submit" class="btn-save" id="submitBtn">
        💾 Сохранить изменения
      </button>
      <a href="/profile" class="btn btn-outline-secondary rounded-pill px-4">Отмена</a>
    </div>
  </form>
</div>

<script>
  // ── Превью аватара ─────────────────────────────────────
  function previewAvatar(input) {
    var errEl = document.getElementById('avatarError');
    errEl.style.display = 'none';

    if (!input.files || !input.files[0]) return;
    var file = input.files[0];

    if (file.size > 3 * 1024 * 1024) {
      errEl.textContent = 'Файл слишком большой (максимум 3 МБ)';
      errEl.style.display = 'block';
      input.value = '';
      return;
    }
    var allowed = ['image/jpeg','image/png','image/webp'];
    if (!allowed.includes(file.type)) {
      errEl.textContent = 'Разрешены только JPEG, PNG, WebP';
      errEl.style.display = 'block';
      input.value = '';
      return;
    }

    var reader = new FileReader();
    reader.onload = e => document.getElementById('avatarPreview').src = e.target.result;
    reader.readAsDataURL(file);
  }

  // ── Счётчик символов ───────────────────────────────────
  var aboutMe = document.getElementById('aboutMeText');
  var aboutCnt = document.getElementById('aboutMeCount');
  function updateCount() {
    var len = aboutMe.value.length;
    aboutCnt.textContent = len;
    var p = aboutMe.parentElement.querySelector('.char-counter');
    p.className = 'char-counter' + (len > 900 ? ' warn' : '') + (len >= 1000 ? ' over' : '');
  }
  if (aboutMe) { updateCount(); aboutMe.addEventListener('input', updateCount); }

  // ── Email валидация ────────────────────────────────────
  document.getElementById('emailInput').addEventListener('blur', function() {
    var errEl = document.getElementById('emailError');
    var val = this.value.trim();
    if (val && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(val)) {
      errEl.textContent = 'Некорректный формат email';
      errEl.style.display = 'block';
      this.classList.add('is-invalid');
    } else {
      errEl.style.display = 'none';
      this.classList.remove('is-invalid');
    }
  });

  // ── Надёжность пароля ─────────────────────────────────
  function checkStrength(val) {
    var fill = document.getElementById('strengthFill');
    var text = document.getElementById('strengthText');
    if (!val) { fill.style.width='0%'; text.textContent=''; return; }

    var score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    var map = [
      ['5%',  '#ef4444', 'Очень слабый'],
      ['30%', '#f97316', 'Слабый'],
      ['55%', '#f59e0b', 'Средний'],
      ['80%', '#22c55e', 'Надёжный'],
      ['100%','#16a34a', 'Очень надёжный']
    ];
    var [w, c, t] = map[Math.min(score, 4)];
    fill.style.width = w; fill.style.background = c;
    text.textContent = t; text.style.color = c;
  }

  // ── Проверка совпадения паролей ───────────────────────
  function checkMatch() {
    var np = document.getElementById('newPass').value;
    var cp = document.getElementById('confirmPass').value;
    var errEl = document.getElementById('matchError');
    if (cp && np !== cp) errEl.style.display = 'block';
    else errEl.style.display = 'none';
  }

  // ── Финальная валидация перед отправкой ───────────────
  document.getElementById('editForm').addEventListener('submit', function(e) {
    var np = document.getElementById('newPass').value;
    var cp = document.getElementById('confirmPass').value;
    var cur = document.getElementById('currentPass').value;

    if (np && np.length < 6) {
      e.preventDefault();
      alert('Новый пароль должен содержать минимум 6 символов.');
      return;
    }
    if (np && np !== cp) {
      e.preventDefault();
      alert('Новый пароль и подтверждение не совпадают.');
      return;
    }
    if (np && !cur) {
      e.preventDefault();
      alert('Введите текущий пароль для его смены.');
      return;
    }

    var emailVal = document.getElementById('emailInput').value.trim();
    if (emailVal && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(emailVal)) {
      e.preventDefault();
      alert('Некорректный формат email.');
      return;
    }
  });
</script>

</body>
</html>

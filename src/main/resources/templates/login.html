<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — BookCrossing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: url('/images/bg.png') center/cover no-repeat fixed;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(3px);
            z-index: 0;
        }
        .login-box {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
            margin: 16px;
        }
        .brand {
            text-align: center; margin-bottom: 28px;
        }
        .brand .icon {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, #3b5bdb, #7048e8);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: #fff; margin-bottom: 12px;
        }
        .brand h1 { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; }
        .brand p  { font-size: .875rem; color: #94a3b8; }

        .form-label { font-size: .8rem; font-weight: 600; color: #64748b; margin-bottom: 6px; }
        .form-control {
            border: 1.5px solid #e2e8f0; border-radius: 12px;
            padding: 11px 14px; font-size: .95rem;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus {
            border-color: #3b5bdb;
            box-shadow: 0 0 0 3px rgba(59,91,219,.12);
        }
        .input-icon { position: relative; }
        .input-icon i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; font-size: .95rem;
        }
        .input-icon .form-control { padding-left: 40px; }

        .btn-login {
            width: 100%; padding: 13px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #3b5bdb, #7048e8);
            color: #fff; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: opacity .2s, transform .1s;
            box-shadow: 0 4px 16px rgba(59,91,219,.35);
        }
        .btn-login:hover  { opacity: .9; }
        .btn-login:active { transform: scale(.98); }

        .divider { text-align: center; color: #cbd5e1; margin: 18px 0; font-size: .8rem; }
        .link { color: #3b5bdb; font-weight: 600; text-decoration: none; }
        .link:hover { text-decoration: underline; }

        /* ── Алерты ── */
        .alert { border-radius: 12px; font-size: .88rem; padding: 12px 16px; }
        .alert-danger  { background: #fff1f2; border: 1.5px solid #fecdd3; color: #be123c; }
        .alert-warning { background: #fffbeb; border: 1.5px solid #fde68a; color: #92400e; }
        .alert-success { background: #f0fdf4; border: 1.5px solid #bbf7d0; color: #15803d; }

        /* ── Блок блокировки ── */
        .block-card {
            background: #fff1f2;
            border: 1.5px solid #fecdd3;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .block-card .block-icon { font-size: 1.8rem; text-align: center; margin-bottom: 8px; }
        .block-card h6 { font-weight: 700; color: #be123c; font-size: .95rem; margin-bottom: 8px; }
        .block-card .block-detail {
            font-size: .82rem; color: #7f1d1d;
            display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px;
        }
        .block-card .block-detail i { flex-shrink: 0; margin-top: 2px; }
    </style>
</head>
<body>
<div class="login-box">

    <!-- Логотип -->
    <div class="brand">
        <div class="icon"><i class="fas fa-book-open"></i></div>
        <h1>BookCrossing</h1>
        <p>Обменивайтесь книгами с удовольствием</p>
    </div>

    <!-- ══ Аккаунт заблокирован ══ -->
    <div th:if="${param.blocked != null}" class="block-card">
        <div class="block-icon">🔒</div>
        <h6 class="text-center">Аккаунт заблокирован</h6>
        <div class="block-detail" th:if="${param.reason != null}">
            <i class="fas fa-info-circle text-danger"></i>
            <div>
                <span style="font-weight:600;">Причина: </span>
                <span th:text="${#strings.replace(param.reason[0], '+', ' ')}"></span>
            </div>
        </div>
        <div class="block-detail" th:if="${param.until != null}">
            <i class="fas fa-clock text-danger"></i>
            <div>
                <span style="font-weight:600;">Срок: </span>
                <span th:text="${#strings.replace(param.until[0], '+', ' ')}"></span>
            </div>
        </div>
        <div class="block-detail mt-2" style="color:#9f1239;font-size:.78rem;">
            <i class="fas fa-envelope"></i>
            <span>Если считаете блокировку ошибочной, обратитесь к администратору.</span>
        </div>
    </div>

    <!-- ══ Неверный логин/пароль ══ -->
    <div th:if="${param.error != null and param.blocked == null}" class="alert alert-danger mb-3">
        <i class="fas fa-exclamation-circle me-2"></i>
        Неверный логин или пароль. Попробуйте ещё раз.
    </div>

    <!-- ══ Выход ══ -->
    <div th:if="${param.logout != null}" class="alert alert-success mb-3">
        <i class="fas fa-check-circle me-2"></i>
        Вы успешно вышли из системы.
    </div>

    <!-- ══ Форма входа ══ -->
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Логин</label>
            <div class="input-icon">
                <i class="fas fa-user"></i>
                <input type="text" name="username" class="form-control"
                       placeholder="Введите логин" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Пароль</label>
            <div class="input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="form-control"
                       placeholder="Введите пароль" required>
            </div>
        </div>
        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt me-2"></i>Войти
        </button>
    </form>

    <div class="divider">— или —</div>

    <p class="text-center" style="font-size:.875rem; color:#64748b;">
        Нет аккаунта?
        <a th:href="@{/register}" class="link">Зарегистрироваться</a>
    </p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>

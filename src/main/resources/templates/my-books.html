<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Мои книги')}"></head>
<body>
<meta name="_csrf" th:content="${_csrf.token}">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid px-4 pt-3">

    <!-- Flash-сообщения -->
    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show mb-3" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Поиск -->
    <div class="card p-3 mb-4 border-0 shadow-sm" style="border-radius:12px;">
        <form th:action="@{/my-books}" method="get" class="row g-2 align-items-center">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="fas fa-search text-muted"></i>
                    </span>
                    <input type="text" name="query" class="form-control border-start-0"
                           placeholder="Поиск по названию..." th:value="${searchQuery}">
                </div>
            </div>
            <div class="col-md-4">
                <select name="genre" class="form-select" onchange="this.form.submit()">
                    <option value="">Все жанры</option>
                    <option th:each="g : ${genres}"
                            th:value="${g.name()}"
                            th:text="${g.displayValue}"
                            th:selected="${g.name() == selectedGenre}"></option>
                </select>
            </div>
            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-primary">Найти</button>
            </div>
        </form>
    </div>

    <div class="mb-3">
        <a th:href="@{/add-book}" class="btn btn-success rounded-pill px-4">
            <i class="fas fa-plus me-2"></i>Добавить книгу
        </a>
    </div>

    <!-- Пустое состояние -->
    <div th:if="${books == null || books.empty}" class="text-center py-5 text-muted">
        <i class="fas fa-book-open" style="font-size:3rem; color:#d1d5db;"></i>
        <p class="mt-3 mb-1">У вас пока нет книг</p>
        <a th:href="@{/add-book}" class="btn btn-primary rounded-pill px-4 mt-2">Добавить первую</a>
    </div>

    <!-- Сетка -->
    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3"
         th:unless="${books == null || books.empty}">
        <div class="col" th:each="book : ${books}">
            <div class="card h-100 book-card position-relative">

                <span class="badge rounded-pill status-badge"
                      th:text="${book.status.displayValue}"
                      th:classappend="${book.status.name() == 'FREE'} ? 'bg-success' : (${book.status.name() == 'BOOKED'} ? 'bg-primary' : 'bg-danger')">
                </span>

                <div class="card-img-container">
                    <img th:src="${book.imageDisplay}"
                         class="card-img-top" alt="Обложка" loading="lazy">
                </div>

                <div class="card-body">
                    <h5 class="card-title text-truncate" th:text="${book.title}"></h5>
                    <p class="card-text text-muted small text-truncate" th:text="${book.author}"></p>
                    <span class="badge bg-light text-dark border" th:text="${book.genre}"></span>
                </div>

                <div class="card-footer d-flex flex-column gap-2">
                    <!-- Сменить статус -->
                    <form th:if="${book.status.name() != 'BOOKED'}" th:action="@{/book/{id}/status(id=${book.id})}" method="post">
                        <button type="submit" class="btn btn-sm w-100"
                                th:classappend="${book.status.name() == 'FREE'} ? 'btn-outline-warning' : 'btn-outline-success'"
                                th:text="${book.status.name() == 'FREE'} ? 'Пометить занятой' : 'Пометить свободной'">
                        </button>
                    </form>

                    <!-- Удалить -->
                    <button type="button"
                            class="btn btn-sm btn-outline-danger w-100"
                            onclick="confirmDelete(this)"
                            th:data-book-id="${book.id}"
                            th:data-book-title="${book.title}">
                        <i class="fas fa-trash-alt me-1"></i>Удалить
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модал подтверждения -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-body text-center p-4">
                <div class="mb-3" style="font-size:2.5rem;">🗑️</div>
                <h5 class="fw-bold mb-2">Удалить книгу?</h5>
                <p class="text-muted small mb-1" id="deleteBookTitle"></p>
                <p class="text-danger small mb-4">Все отзывы также будут удалены. Действие необратимо.</p>
                <form id="deleteForm" method="post">
                    <button type="submit" class="btn btn-danger rounded-pill w-100 mb-2">
                        <i class="fas fa-trash-alt me-2"></i>Да, удалить
                    </button>
                </form>
                <button type="button" class="btn btn-outline-secondary rounded-pill w-100"
                        data-bs-dismiss="modal">Отмена</button>
            </div>
        </div>
    </div>
</div>


<!-- ══ Входящие запросы на бронирование ══ -->
<div th:if="${pendingBookings != null and !pendingBookings.empty}" class="mt-4">
    <div class="d-flex align-items-center gap-2 mb-3">
        <h5 class="fw-bold mb-0" style="color:#1a1a2e;">📬 Запросы на бронирование</h5>
        <span class="badge bg-danger rounded-pill" th:text="${pendingBookings.size()}"></span>
    </div>
    <div class="row g-3">
        <div th:each="booking : ${pendingBookings}" class="col-12">
            <div class="card border-0 shadow-sm rounded-4" style="border-left:4px solid #f59e0b !important;">
                <div class="card-body p-3">
                    <div class="d-flex flex-wrap justify-content-between align-items-start gap-2">
                        <div>
                            <div class="fw-semibold" style="font-size:.95rem;">
                                📚 <span th:text="${booking.book.title}"></span>
                            </div>
                            <div class="text-muted small mt-1">
                                👤 <strong th:text="'@' + ${booking.requester.username}"></strong>
                                хочет забронировать
                            </div>
                            <div th:if="${booking.message != null}" class="small mt-1"
                                 style="color:#374151; background:#f8fafc; border-radius:8px; padding:6px 10px; margin-top:6px;">
                                💬 <span th:text="${booking.message}"></span>
                            </div>
                            <div th:if="${booking.bookedUntil != null}" class="text-muted small mt-1">
                                🗓️ На срок до: <span th:text="${#temporals.format(booking.bookedUntil, 'dd.MM.yyyy')}"></span>
                            </div>
                            <div class="text-muted small mt-1">
                                🕐 <span th:text="${#temporals.format(booking.requestedAt, 'dd.MM.yyyy HH:mm')}"></span>
                            </div>
                        </div>
                        <div class="d-flex gap-2 flex-wrap mt-2">
                            <!-- Одобрить -->
                            <button class="btn btn-success btn-sm rounded-pill px-3 fw-semibold"
                                    onclick="openAcceptModal([[${booking.id}]], [[${booking.book.title}]])">
                                ✅ Одобрить
                            </button>
                            <!-- Отклонить -->
                            <button class="btn btn-outline-danger btn-sm rounded-pill px-3"
                                    onclick="openRejectModal([[${booking.id}]], [[${booking.book.title}]])">
                                ❌ Отклонить
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модал одобрения -->
<div class="modal fade" id="acceptModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-1">✅ Одобрить бронирование</h5>
                <p class="text-muted small mb-3" id="acceptBookTitle"></p>
                <form id="acceptForm" method="post">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Сообщение пользователю <span class="text-muted">(необязательно)</span></label>
                        <textarea name="response" rows="2" class="form-control rounded-3"
                                  placeholder="Когда можно подойти, адрес, контакт..."></textarea>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success rounded-pill fw-semibold">✅ Подтвердить</button>
                        <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Отмена</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Модал отклонения -->
<div class="modal fade" id="rejectModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-1">❌ Отклонить бронирование</h5>
                <p class="text-muted small mb-3" id="rejectBookTitle"></p>
                <form id="rejectForm" method="post">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Причина <span class="text-muted">(необязательно)</span></label>
                        <textarea name="response" rows="2" class="form-control rounded-3"
                                  placeholder="Книга уже передана, не могу встретиться..."></textarea>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger rounded-pill fw-semibold">❌ Отклонить</button>
                        <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Отмена</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function confirmDelete(btn) {
        document.getElementById('deleteBookTitle').textContent =
            '«' + btn.getAttribute('data-book-title') + '»';
        document.getElementById('deleteForm').action =
            '/book/' + btn.getAttribute('data-book-id') + '/delete';
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    function openAcceptModal(id, title) {
        document.getElementById('acceptBookTitle').textContent = '«' + title + '»';
        var csrfToken = document.querySelector('meta[name="_csrf"]');
        var form = document.getElementById('acceptForm');
        form.action = '/bookings/' + id + '/accept';
        // Add CSRF token if not already present
        var existing = form.querySelector('input[name="_csrf"]');
        if (!existing && csrfToken) {
            var inp = document.createElement('input');
            inp.type = 'hidden'; inp.name = '_csrf'; inp.value = csrfToken.content;
            form.appendChild(inp);
        }
        new bootstrap.Modal(document.getElementById('acceptModal')).show();
    }

    function openRejectModal(id, title) {
        document.getElementById('rejectBookTitle').textContent = '«' + title + '»';
        var csrfToken = document.querySelector('meta[name="_csrf"]');
        var form = document.getElementById('rejectForm');
        form.action = '/bookings/' + id + '/reject';
        var existing = form.querySelector('input[name="_csrf"]');
        if (!existing && csrfToken) {
            var inp = document.createElement('input');
            inp.type = 'hidden'; inp.name = '_csrf'; inp.value = csrfToken.content;
            form.appendChild(inp);
        }
        new bootstrap.Modal(document.getElementById('rejectModal')).show();
    }
</script>
</body>
</html>
